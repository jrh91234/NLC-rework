<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner to Google Sheet</title>
    <!-- ใช้ Tailwind CSS สำหรับความสวยงามและการแสดงผลบนมือถือ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ไลบรารีสำหรับอ่าน QR Code และ Data Matrix -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- ไอคอน -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
        #reader video { object-fit: cover; }
        /* ซ่อน UI เริ่มต้นของไลบรารีบางส่วนเพื่อให้เราสร้าง UI เอง */
        #reader__dashboard_section_csr span { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold"><i class="fas fa-qrcode mr-2"></i> สแกนลง Sheet</h1>
        <button id="btnSettings" class="text-white p-2">
            <i class="fas fa-cog text-xl"></i>
        </button>
    </header>

    <!-- Settings Modal (ตั้งค่า URL) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
            <h2 class="text-lg font-bold mb-4">ตั้งค่า Google Sheet API</h2>
            <p class="text-sm text-gray-500 mb-4">นhttps://script.google.com/macros/s/AKfycbwR_T6rWonZ3yoRBZdbbnUeYPrV9QSWit9xAlNi3TockFKSuffOS3Jt7cMgp0ctVgL_cA/exec</p>
            <input type="text" id="apiUrlInput" class="w-full border border-gray-300 rounded-lg p-3 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://script.google.com/macros/s/...">
            <div class="flex justify-end gap-2">
                <button id="btnCancelSettings" class="px-4 py-2 bg-gray-200 rounded-lg text-gray-700">ยกเลิก</button>
                <button id="btnSaveSettings" class="px-4 py-2 bg-blue-600 rounded-lg text-white font-semibold">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col p-4 relative">
        
        <!-- Camera Area -->
        <div class="bg-black rounded-xl shadow-inner relative flex-grow max-h-[50vh] flex items-center justify-center overflow-hidden">
            <div id="reader"></div>
            
            <!-- Placeholder before camera starts -->
            <div id="cameraPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-white/50 z-0">
                <i class="fas fa-camera text-4xl mb-2"></i>
                <p>กดปุ่มเริ่มสแกนเพื่อเปิดกล้อง</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center gap-4 mt-6">
            <button id="btnStart" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition w-1/2 justify-center">
                <i class="fas fa-play"></i> เริ่มสแกน
            </button>
            <button id="btnStop" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition w-1/2 justify-center hidden">
                <i class="fas fa-stop"></i> หยุดกล้อง
            </button>
        </div>

        <!-- Scan Result Area -->
        <div class="mt-6 bg-white p-4 rounded-xl shadow-md">
            <label class="block text-sm font-semibold text-gray-700 mb-2">ผลการสแกน</label>
            <div class="flex gap-2">
                <input type="text" id="scanResult" class="flex-grow border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none" readonly placeholder="ยังไม่มีข้อมูล">
                <button id="btnSubmit" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold disabled:opacity-50 disabled:bg-gray-400 transition" disabled>
                    <i class="fas fa-paper-plane mr-1"></i> บันทึก
                </button>
            </div>
        </div>

        <!-- Loading / Notification -->
        <div id="notification" class="mt-4 text-center text-sm font-semibold p-3 rounded-lg hidden transition-all duration-300"></div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let html5QrCode = null;
            const readerElementId = "reader";
            
            // DOM Elements
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const btnSubmit = document.getElementById('btnSubmit');
            const scanResultInput = document.getElementById('scanResult');
            const cameraPlaceholder = document.getElementById('cameraPlaceholder');
            const notification = document.getElementById('notification');
            
            // Settings DOM
            const btnSettings = document.getElementById('btnSettings');
            const settingsModal = document.getElementById('settingsModal');
            const btnCancelSettings = document.getElementById('btnCancelSettings');
            const btnSaveSettings = document.getElementById('btnSaveSettings');
            const apiUrlInput = document.getElementById('apiUrlInput');

            // Load saved URL from localStorage
            let gasUrl = localStorage.getItem('gasWebUrl') || '';
            apiUrlInput.value = gasUrl;

            // Settings Logic
            btnSettings.addEventListener('click', () => settingsModal.classList.remove('hidden'));
            btnCancelSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));
            btnSaveSettings.addEventListener('click', () => {
                gasUrl = apiUrlInput.value.trim();
                localStorage.setItem('gasWebUrl', gasUrl);
                settingsModal.classList.add('hidden');
                showNotification('บันทึก URL เรียบร้อยแล้ว', 'success');
            });

            // Initialize Scanner
            function initScanner() {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode(readerElementId);
                }
            }

            // Function to handle successful scan
            const onScanSuccess = (decodedText, decodedResult) => {
                // Vibrate if supported (Mobile)
                if (navigator.vibrate) navigator.vibrate(200);

                // Stop scanning to prevent multiple triggers
                stopScanner();

                // Display result
                scanResultInput.value = decodedText;
                btnSubmit.disabled = false;
                
                showNotification('สแกนสำเร็จ!', 'success');
                
                // Auto-submit option (Uncomment below to submit automatically upon scan)
                // submitToGoogleSheet();
            };

            const onScanFailure = (error) => {
                // Background scan errors (keep quiet)
            };

            // Start Camera
            async function startScanner() {
                initScanner();
                cameraPlaceholder.classList.add('hidden');
                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                scanResultInput.value = '';
                btnSubmit.disabled = true;

                try {
                    // Start looking for codes via the rear camera
                    await html5QrCode.start(
                        { facingMode: "environment" }, // ใช้กล้องหลัง
                        {
                            fps: 10,
                            qrbox: { width: 250, height: 250 },
                            // รองรับรูปแบบ Data Matrix
                            formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE ]
                        },
                        onScanSuccess,
                        onScanFailure
                    );
                } catch (err) {
                    showNotification("ไม่สามารถเปิดกล้องได้: " + err, "error");
                    stopScanner();
                }
            }

            // Stop Camera
            async function stopScanner() {
                if (html5QrCode && html5QrCode.isScanning) {
                    try {
                        await html5QrCode.stop();
                    } catch (err) {
                        console.error("Failed to stop scanner", err);
                    }
                }
                cameraPlaceholder.classList.remove('hidden');
                btnStart.classList.remove('hidden');
                btnStop.classList.add('hidden');
            }

            // Submit Data to Google Sheets API
            async function submitToGoogleSheet() {
                if (!gasUrl) {
                    showNotification('กรุณาตั้งค่า Google Web App URL ก่อน', 'error');
                    settingsModal.classList.remove('hidden');
                    return;
                }

                const dataText = scanResultInput.value;
                if (!dataText) return;

                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> กำลังบันทึก...';
                
                try {
                    // ส่งข้อมูลแบบ GET method ไปที่ Google Apps Script
                    const response = await fetch(`${gasUrl}?text=${encodeURIComponent(dataText)}`);
                    const result = await response.json();

                    if (result.status === 'success') {
                        showNotification('บันทึกลง Sheet สำเร็จ!', 'success');
                        scanResultInput.value = ''; // เคลียร์ช่องข้อความ
                    } else {
                        showNotification('เกิดข้อผิดพลาด: ' + result.message, 'error');
                    }
                } catch (error) {
                    showNotification('เชื่อมต่อขัดข้อง: ตรวจสอบ URL หรืออินเทอร์เน็ต', 'error');
                    console.error(error);
                } finally {
                    btnSubmit.innerHTML = '<i class="fas fa-paper-plane mr-1"></i> บันทึก';
                    btnSubmit.disabled = scanResultInput.value === '';
                }
            }

            // Show Notification Message
            function showNotification(message, type) {
                notification.textContent = message;
                notification.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
                
                if (type === 'success') {
                    notification.classList.add('bg-green-100', 'text-green-800');
                } else {
                    notification.classList.add('bg-red-100', 'text-red-800');
                }
                
                setTimeout(() => {
                    notification.classList.add('hidden');
                }, 4000);
            }

            // Event Listeners
            btnStart.addEventListener('click', startScanner);
            btnStop.addEventListener('click', stopScanner);
            btnSubmit.addEventListener('click', submitToGoogleSheet);
            
            // Handle cleanup if user leaves page
            window.addEventListener('beforeunload', stopScanner);
        });
    </script>
</body>
</html>
