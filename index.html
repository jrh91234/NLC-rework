<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner to Google Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
        #reader video { object-fit: cover; }
        #reader__dashboard_section_csr span { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-center items-center z-10">
        <h1 class="text-xl font-bold"><i class="fas fa-qrcode mr-2"></i> สแกนลง Sheet</h1>
    </header>

    <main class="flex-grow flex flex-col p-4 relative">
        <div class="bg-black rounded-xl shadow-inner relative flex-grow max-h-[50vh] flex items-center justify-center overflow-hidden">
            <div id="reader"></div>
            <div id="cameraPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-white/50 z-0">
                <i class="fas fa-camera text-4xl mb-2"></i>
                <p>กดปุ่มเริ่มสแกนเพื่อเปิดกล้อง</p>
            </div>
            <div id="focusHint" class="absolute bottom-2 inset-x-0 text-center text-white/60 text-xs hidden pointer-events-none">
                แตะที่ภาพเพื่อโฟกัส
            </div>
        </div>

        <div class="flex justify-center gap-4 mt-6">
            <button id="btnStart" class="bg-green-500 hover:bg-green-600 text-white px-4 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition flex-1 justify-center">
                <i class="fas fa-play"></i> เริ่มสแกน
            </button>
            <button id="btnStop" class="bg-red-500 hover:bg-red-600 text-white px-4 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition flex-1 justify-center hidden">
                <i class="fas fa-stop"></i> หยุดกล้อง
            </button>
            <button id="btnTorch" class="bg-gray-600 hover:bg-yellow-400 text-white px-4 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition flex-1 justify-center hidden">
                <i class="fas fa-lightbulb"></i> ไฟฉาย
            </button>
            <label for="fileInput" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 transition flex-1 justify-center cursor-pointer">
                <i class="fas fa-image"></i> เลือกรูป
            </label>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>

        <div class="mt-6 bg-white p-4 rounded-xl shadow-md">
            <label class="block text-sm font-semibold text-gray-700 mb-2">ผลการสแกน</label>
            <div class="flex gap-2">
                <input type="text" id="scanResult" class="flex-grow border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none" readonly placeholder="ยังไม่มีข้อมูล">
                <button id="btnSubmit" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold disabled:opacity-50 disabled:bg-gray-400 transition" disabled>
                    <i class="fas fa-paper-plane mr-1"></i> บันทึก
                </button>
            </div>
        </div>

        <div id="notification" class="mt-4 text-center text-sm font-semibold p-3 rounded-lg hidden transition-all duration-300"></div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let html5QrCode = null;
            const readerElementId = "reader";
            
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const btnTorch = document.getElementById('btnTorch');
            const btnSubmit = document.getElementById('btnSubmit');
            const scanResultInput = document.getElementById('scanResult');
            const cameraPlaceholder = document.getElementById('cameraPlaceholder');
            const focusHint = document.getElementById('focusHint');
            const notification = document.getElementById('notification');
            const fileInput = document.getElementById('fileInput');

            // ฝัง URL ของ Google Apps Script ไว้ตรงนี้เลย
            const gasUrl = "https://script.google.com/macros/s/AKfycbwR_T6rWonZ3yoRBZdbbnUeYPrV9QSWit9xAlNi3TockFKSuffOS3Jt7cMgp0ctVgL_cA/exec";

            // ตัวแปรเก็บค่าล่าสุดที่สแกน/บันทึก เพื่อเช็คซ้ำฝั่งเว็บ
            let lastSubmittedData = '';
            let torchOn = false;

            function initScanner() {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode(readerElementId, {
                        experimentalFeatures: {
                            useBarCodeDetectorIfSupported: true
                        }
                    });
                }
            }

            const onScanSuccess = (decodedText, decodedResult) => {
                if (navigator.vibrate) navigator.vibrate(200);
                stopScanner();
                
                scanResultInput.value = decodedText;
                
                // เช็คซ้ำฝั่ง Web App ก่อนเลย
                if (decodedText === lastSubmittedData) {
                    showNotification('ข้อมูลนี้พึ่งถูกบันทึกไปแล้ว', 'warning');
                    btnSubmit.disabled = true;
                } else {
                    btnSubmit.disabled = false;
                    showNotification('สแกนสำเร็จ! กดบันทึกได้เลย', 'success');
                }
            };

            const onScanFailure = (error) => {};

            async function startScanner() {
                initScanner();
                cameraPlaceholder.classList.add('hidden');
                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                scanResultInput.value = '';
                btnSubmit.disabled = true;

                try {
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        {
                            fps: 10,
                            formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE ]
                        },
                        onScanSuccess,
                        onScanFailure
                    );
                    // Apply continuous autofocus after start (needed for small Data Matrix codes at close range)
                    try {
                        await html5QrCode.applyVideoConstraints({
                            advanced: [{ focusMode: "continuous" }]
                        });
                    } catch (_) {}
                    focusHint.classList.remove('hidden');
                    // Show torch button only if device supports it
                    try {
                        const caps = html5QrCode.getRunningTrackCameraCapabilities();
                        if (caps.torchFeature().isSupported()) {
                            btnTorch.classList.remove('hidden');
                        }
                    } catch (_) {}
                } catch (err) {
                    showNotification("ไม่สามารถเปิดกล้องได้: " + err, "error");
                    stopScanner();
                }
            }

            async function stopScanner() {
                // Show UI immediately so user sees feedback right away
                cameraPlaceholder.classList.remove('hidden');
                btnStart.classList.remove('hidden');
                btnStart.disabled = true;
                btnStop.classList.add('hidden');
                btnTorch.classList.add('hidden');
                focusHint.classList.add('hidden');
                torchOn = false;
                btnTorch.classList.remove('bg-yellow-400');
                btnTorch.classList.add('bg-gray-600');

                if (html5QrCode && html5QrCode.isScanning) {
                    try {
                        await html5QrCode.stop();
                    } catch (err) {
                        console.error("Failed to stop scanner", err);
                    }
                }

                // Clear DOM and release media stream so next start() is always fresh
                if (html5QrCode) {
                    try { html5QrCode.clear(); } catch (_) {}
                    html5QrCode = null;
                }

                btnStart.disabled = false;
            }

            async function toggleTorch() {
                if (!html5QrCode || !html5QrCode.isScanning) return;
                try {
                    const caps = html5QrCode.getRunningTrackCameraCapabilities();
                    if (!caps.torchFeature().isSupported()) return;
                    torchOn = !torchOn;
                    await caps.torchFeature().apply(torchOn);
                    btnTorch.classList.toggle('bg-yellow-400', torchOn);
                    btnTorch.classList.toggle('bg-gray-600', !torchOn);
                } catch (err) {
                    console.error("Torch toggle failed", err);
                }
            }

            async function submitToGoogleSheet() {
                const dataText = scanResultInput.value;
                if (!dataText) return;

                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> กำลังบันทึก...';
                
                try {
                    const response = await fetch(`${gasUrl}?text=${encodeURIComponent(dataText)}`);
                    const result = await response.json();

                    if (result.status === 'success') {
                        showNotification('บันทึกลง Sheet สำเร็จ!', 'success');
                        lastSubmittedData = dataText; // เก็บค่าไว้กันส่งซ้ำ
                        scanResultInput.value = ''; // เคลียร์ช่อง
                    } else {
                        // แจ้งเตือนกรณี Sheet ฟ้องว่าซ้ำ
                        showNotification('❌ ' + result.message, 'warning');
                    }
                } catch (error) {
                    showNotification('เชื่อมต่อขัดข้อง: ตรวจสอบอินเทอร์เน็ต', 'error');
                    console.error(error);
                } finally {
                    btnSubmit.innerHTML = '<i class="fas fa-paper-plane mr-1"></i> บันทึก';
                    // ป้องกันการกดซ้ำจนกว่าจะสแกนใหม่
                    btnSubmit.disabled = true; 
                }
            }

            function showNotification(message, type) {
                notification.textContent = message;
                notification.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'bg-yellow-100', 'text-yellow-800');
                
                if (type === 'success') {
                    notification.classList.add('bg-green-100', 'text-green-800');
                } else if (type === 'warning') {
                    notification.classList.add('bg-yellow-100', 'text-yellow-800');
                } else {
                    notification.classList.add('bg-red-100', 'text-red-800');
                }
                
                setTimeout(() => {
                    notification.classList.add('hidden');
                }, 4000);
            }

            btnStart.addEventListener('click', startScanner);
            btnStop.addEventListener('click', stopScanner);
            btnTorch.addEventListener('click', toggleTorch);
            btnSubmit.addEventListener('click', submitToGoogleSheet);
            
            fileInput.addEventListener('change', async (e) => {
                if (e.target.files.length === 0) return;
                const file = e.target.files[0];
                // Stop camera if running before switching to file scan
                if (html5QrCode && html5QrCode.isScanning) {
                    await stopScanner();
                }
                btnSubmit.disabled = true;
                scanResultInput.value = 'กำลังวิเคราะห์รูปภาพ...';
                // Use a dedicated instance for file scanning without BarcodeDetector API
                // (native BarcodeDetector can fail on image files for certain formats/devices)
                const fileScanner = new Html5Qrcode(readerElementId, {
                    formatsToSupport: [Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE]
                });
                try {
                    let decodedText;
                    try {
                        decodedText = await fileScanner.scanFile(file, false);
                    } finally {
                        try { fileScanner.clear(); } catch (_) {}
                    }
                    onScanSuccess(decodedText, null);
                } catch (err) {
                    scanResultInput.value = '';
                    showNotification('อ่านไม่ออก: ลองถ่ายรูปใหม่ให้ชัดเจนขึ้น', 'error');
                }
                e.target.value = '';
            });

            window.addEventListener('beforeunload', stopScanner);
        });
    </script>
</body>
</html>
